name: CI Pipeline

on:
  push:
    branches: [ main, 'feat/*' ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: interntrack_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
      
      - name: Install Dependencies
        run: npm ci

      - name: Generate Prisma Client
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/interntrack_test
        run: npx prisma generate

      - name: Setup Database
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/interntrack_test
        run: npx prisma db push
        
      - name: Build Next.js Application
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/interntrack_test
          NEXTAUTH_SECRET: testing-secret-key-12345
          NEXTAUTH_URL: http://localhost:3000
        run: npm run build
        
      - name: Install Playwright Browsers
        run: npx playwright install --with-deps
      
      - name: Run Tests & Coverage
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/interntrack_test
          NEXTAUTH_SECRET: testing-secret-key-12345
          NEXTAUTH_URL: http://localhost:3000
        run: |
          npm run coverage
          npx playwright test
